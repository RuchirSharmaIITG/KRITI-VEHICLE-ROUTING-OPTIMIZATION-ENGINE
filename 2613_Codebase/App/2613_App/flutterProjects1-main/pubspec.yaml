name: projects

description: "VELORA - Global Neural Routing System. Flutter mobile app for corporate mobility optimization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # File handling
  file_picker: ^8.1.6
  excel: ^4.0.6
  csv: ^6.0.0
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/